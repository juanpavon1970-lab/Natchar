    // --- Renderizar platos ---
    function renderizarPlatos(lista) {
        const grid = document.getElementById('platosGrid')
        grid.innerHTML = lista.map((plato, i) => `
            <div class="plato" data-id="${plato.id}">
            <div class="plato-img">
                <img src="${plato.imagen}" alt="${plato.nombre}" loading="lazy">
                <div class="plato-img-overlay"></div>
                <span class="plato-ver-mas">Ver más ↗</span>
            </div>
            <div class="plato-content">
                <span class="plato-num">0${i + 1}</span>
                <p class="plato-cat">${plato.categoria}</p>
                <p class="plato-name">${plato.nombre}</p>
                <p class="plato-desc">${plato.descripcion}</p>
                <p class="plato-price"><span>$</span> ${plato.precio.toLocaleString('es-CO')} COP</p>
            </div>
        </div>
    `).join('')

    // Agregar eventos después de renderizar
    grid.querySelectorAll('.plato').forEach(card => {
        card.addEventListener('click', () => {
        const id = parseInt(card.dataset.id)
        const plato = lista.find(p => p.id === id)
        if (plato) abrirModal(plato)
        })
    })
    }

    // Mostrar todos al cargar
    renderizarPlatos(platos)

    // --- Filtros ---
    document.querySelectorAll('.filtro-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        // Marcar activo
        document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('activo'))
        btn.classList.add('activo')

        // Filtrar
        const filtro = btn.dataset.filtro
        const filtrados = filtro === 'todos'
          ? platos
          : platos.filter(p => p.horario === filtro)

        renderizarPlatos(filtrados)
      })
    })

    // --- Cursor ---
    const cursor = document.getElementById('cursor')
    const dot = document.getElementById('cursorDot')
    let mx = 0, my = 0, cx = 0, cy = 0

    document.addEventListener('mousemove', e => {
      mx = e.clientX
      my = e.clientY
      dot.style.left = mx + 'px'
      dot.style.top = my + 'px'
    })

    function animarCursor() {
      cx += (mx - cx) * 0.12
      cy += (my - cy) * 0.12
      cursor.style.left = cx + 'px'
      cursor.style.top = cy + 'px'
      requestAnimationFrame(animarCursor)
    }
    animarCursor()

    document.querySelectorAll('a, button').forEach(el => {
      el.addEventListener('mouseenter', () => {
        cursor.style.transform = 'translate(-50%, -50%) scale(2)'
        cursor.style.borderColor = 'var(--gold)'
      })
      el.addEventListener('mouseleave', () => {
        cursor.style.transform = 'translate(-50%, -50%) scale(1)'
        cursor.style.borderColor = 'var(--cyber-teal)'
      })
    })
    // --- Modal ---
function abrirModal(plato) {
  document.getElementById('modalImg').src      = plato.imagen
  document.getElementById('modalImg').alt      = plato.nombre
  document.getElementById('modalCat').textContent    = plato.categoria
  document.getElementById('modalNombre').textContent = plato.nombre
  document.getElementById('modalDesc').textContent   = plato.descripcion
  document.getElementById('modalPrecio').innerHTML   = `<span>$</span> ${plato.precio.toLocaleString('es-CO')} COP`

  document.getElementById('modalOverlay').classList.add('activo')
  document.body.style.overflow = 'hidden'
}

function cerrarModal() {
  document.getElementById('modalOverlay').classList.remove('activo')
  document.body.style.overflow = ''
}

// Cerrar con Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') cerrarModal()
})
  </script>
<!-- MODAL IMAGEN -->
<div class="modal-overlay" id="modalOverlay" onclick="cerrarModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <button class="modal-cerrar" onclick="cerrarModal()">✕</button>
    <div class="modal-img-wrap">
      <img id="modalImg" src="" alt="">
    </div>
    <div class="modal-info">
      <p class="modal-cat" id="modalCat"></p>
      <h3 class="modal-nombre" id="modalNombre"></h3>
      <p class="modal-desc" id="modalDesc"></p>
      <p class="modal-precio" id="modalPrecio"></p>
    </div>
  </div>
